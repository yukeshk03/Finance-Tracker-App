name: Build Finance Tracker APK

# Triggers: every push to main branch, or manually from GitHub UI
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you click "Run workflow" manually on GitHub

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest   # GitHub provides a free Ubuntu machine

    steps:

      # ── 1. Download your code ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js (to build the React app) ───────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Set up Java 17 (required by Android/Gradle) ───────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Set up Android SDK ────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Accept Android SDK licenses ───────────────────────────────────
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. Install Node dependencies ─────────────────────────────────────
      - name: Install npm packages
        run: npm ci --legacy-peer-deps

      # ── 7. Build the React web app (creates /dist folder) ────────────────
      - name: Build React app
        run: npm run build

      # ── 8. Sync Capacitor (copies dist into Android project) ─────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 9. Make Gradle wrapper executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build the debug APK ───────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 11. Save the APK as a downloadable artifact ───────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK stays available for 30 days

      # ── 12. Print success message ─────────────────────────────────────────
      - name: Done
        run: |
          echo "==================================="
          echo " APK built successfully!"
          echo " Go to: Actions tab → this run → Artifacts"
          echo " Download: finance-tracker-debug-apk"
          echo "==================================="
